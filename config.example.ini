; pizero-lottery-miner configuration.
; Copy this file to config.ini and edit it:   cp config.example.ini config.ini

[wallet]
; YOUR Bitcoin address. If you ever win a block, the reward is paid here.
; Use a bech32 (bc1...) address you control.
address = bc1qexampleexampleexampleexampleexampleexample

[pool]
; Stratum URL of a SOLO pool (you keep the whole block reward if you win).
;   solo.ckpool.org:3333   - no signup, 1% fee (default)
;   public-pool.io:21496   - open source, zero fee, self-hostable
;   pool.nerdminers.org    - does NOT work here: it whitelists NerdMiner/Bitaxe
;                            firmware by user-agent and rejects cpuminer.
url = stratum+tcp://solo.ckpool.org:3333
worker = pizero
password = x

; Share difficulty to request from the pool via mining.suggest_difficulty.
; A Pi Zero (~0.25 MH/s) can't meet a pool's default (ckpool ~10000, public-pool
; ~100000) -- it would take *years* to submit one share, so the dashboard's
; share / best-share numbers would never move. 1 is the lowest a pool accepts
; (~5 h per share at this hashrate, but the numbers do move). Needs the patched
; minerd built by scripts/install.sh; a stock minerd ignores this. 0 = disable
; (use the pool default difficulty).
suggest_difficulty = 1

; Pool stats API used for the "best share difficulty" (the lottery number).
; {address} is substituted with the wallet address above.
;   ckpool:       https://solo.ckpool.org/users/{address}
;   public-pool:  https://public-pool.io:40557/api/client/{address}
stats_api = https://solo.ckpool.org/users/{address}
; one of: ckpool | public-pool | none
stats_api_type = ckpool

[miner]
; Path to the cpuminer binary (pooler's is "minerd", cpuminer-multi is "cpuminer").
binary = /usr/local/bin/minerd
algo = sha256d
threads = 1
; Log file the dashboard parses for live hashrate/shares.
log_file = /var/log/pizero-miner/cpuminer.log

[display]
brightness = 60        ; backlight 0-100
refresh_seconds = 2    ; LCD redraw cadence (keep >= 1 to spare the single core)

[network]
mempool_api = https://mempool.space/api
fiat = USD             ; USD | BRL | none
poll_seconds = 120     ; how often to query pool/chain APIs
